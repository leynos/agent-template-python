name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  MARKDOWNLINT_CLI2_VERSION: 0.22.1
  MBAKE_VERSION: 1.4.6

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@4d696e72fff6db49f34302ccf119ba978f1032c9
        with:
          toolchain: stable

      - name: Install template test tools
        run: |
          npm install -g "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}"
          uv tool install "mbake==${MBAKE_VERSION}"

      - name: Run template tests
        run: make test

      - name: Check spelling
        run: make spelling
