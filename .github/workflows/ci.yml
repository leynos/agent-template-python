name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  MARKDOWNLINT_CLI2_VERSION: 0.22.1
  MBAKE_VERSION: 1.4.6

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          toolchain: stable

      - name: Install template test tools
        run: |
          npm install -g "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}"
          uv tool install "mbake==${MBAKE_VERSION}"

      - name: Run template tests
        run: make test

      - name: Check spelling
        run: make spelling
