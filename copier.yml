_subdirectory: template
_min_version: '7.0'

project_name:
  type: str
  default: my_project
  help: 'Project name'

package_name:
  type: str
  default: "{{ project_name.replace('-', '_') }}"
  help: 'Python import package name'

use_rust:
  type: bool
  default: false
  help: 'Include Rust implementation via PyO3'

python_version:
  type: str
  default: "3.12"
  help: Minimum supported Python version

# Computed: mutmut mutation testing needs a base interpreter of 3.13 or
# greater because the shared workflow's helper scripts require >= 3.13.

mutmut_supported:
  type: bool
  default: "{{ python_version.split('.')[1] | int >= 13 }}"
  when: false

codescene_project_id:
  type: str
  default: ""
  help: >-
    CodeScene project id for the coverage gate (leave blank until this repo
    is onboarded to CodeScene). When set, the value is surfaced in the CI
    deferred-gate note; token-less repos stay green regardless.
